<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KubeStellar Console Analytics</title>
  <script src="/vendor/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface-hover: #242736;
      --border: #2a2d3a;
      --text: #e4e4e7;
      --text-muted: #9ca3af;
      --accent: #6366f1;
      --accent-light: #818cf8;
      --green: #22c55e;
      --red: #ef4444;
      --yellow: #eab308;
      --blue: #3b82f6;
      --purple: #a855f7;
      --orange: #f97316;
      --cyan: #06b6d4;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header h1 {
      font-size: 18px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent-light), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      display: inline-block;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .refresh-btn {
      background: var(--surface-hover);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
    }

    .refresh-btn:hover { background: var(--accent); border-color: var(--accent); }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px;
    }

    /* Loading state */
    .loading-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 16px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 8px;
      padding: 16px 20px;
      color: var(--red);
      max-width: 600px;
      margin: 40px auto;
    }

    /* KPI Cards */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      transition: border-color 0.2s;
    }

    .kpi-card:hover { border-color: var(--accent); }

    .kpi-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .kpi-value {
      font-size: 28px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .kpi-change {
      font-size: 13px;
      margin-top: 4px;
      font-weight: 500;
    }

    .kpi-change.up { color: var(--green); }
    .kpi-change.down { color: var(--red); }
    .kpi-change.flat { color: var(--text-muted); }

    /* Chart grid */
    .chart-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .chart-card.full-width {
      grid-column: 1 / -1;
    }

    .chart-card h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 16px;
      color: var(--text);
    }

    .chart-wrapper {
      position: relative;
      height: 280px;
    }

    /* Tables */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      overflow-x: auto;
    }

    .table-card h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      color: var(--text-muted);
      font-weight: 500;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td {
      padding: 8px 12px;
      border-bottom: 1px solid rgba(42, 45, 58, 0.5);
    }

    tr:hover td { background: var(--surface-hover); }

    .num { text-align: right; font-variant-numeric: tabular-nums; }

    /* Funnel */
    .funnel-container {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 220px;
      padding: 20px 0;
    }

    .funnel-step {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .funnel-bar {
      width: 100%;
      border-radius: 6px 6px 0 0;
      min-height: 4px;
      transition: height 0.5s ease;
    }

    .funnel-label {
      font-size: 11px;
      text-align: center;
      color: var(--text-muted);
      line-height: 1.3;
    }

    .funnel-value {
      font-size: 16px;
      font-weight: 700;
    }

    .funnel-pct {
      font-size: 11px;
      color: var(--text-muted);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .chart-grid { grid-template-columns: 1fr; }
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .container { padding: 16px; }
    }

    /* Insight cards */
    .insights-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }

    .insight-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      border-left: 3px solid var(--accent);
    }

    .insight-card.warning { border-left-color: var(--yellow); }
    .insight-card.success { border-left-color: var(--green); }
    .insight-card.danger { border-left-color: var(--red); }

    .insight-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .insight-body {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1.5;
    }

    /* Section headings */
    .section-title {
      font-size: 16px;
      font-weight: 600;
      margin: 32px 0 16px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    /* Back link */
    .back-link {
      color: var(--accent-light);
      text-decoration: none;
      font-size: 13px;
    }

    .back-link:hover { text-decoration: underline; }

    /* Sparkline trend indicators */
    .trend-indicator {
      display: inline-block;
      font-size: 10px;
      margin-left: 6px;
      font-weight: 600;
      vertical-align: middle;
    }
    .trend-indicator.up { color: var(--red); }
    .trend-indicator.down { color: var(--green); }
    .trend-indicator.flat { color: var(--text-muted); }

  </style>
</head>
<body>
  <div class="header">
    <div class="header-left">
      <a href="/" class="back-link">&larr; Console</a>
      <h1>KubeStellar Console Analytics</h1>
    </div>
    <div class="header-right">
      <label style="display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none" title="Include dev traffic from localhost (Vite HMR inflates user counts)">
        <input type="checkbox" id="include-localhost" style="accent-color:var(--accent);cursor:pointer">
        <span style="font-size:12px;color:var(--text-muted)">Include localhost</span>
      </label>
      <span id="cache-status"></span>
      <span class="status-dot" id="status-dot"></span>
      <button class="refresh-btn" id="refresh-btn" onclick="loadData(true)">Refresh</button>
    </div>
  </div>

  <div class="container" id="content">
    <div class="loading-overlay" id="loading">
      <div class="spinner"></div>
      <div style="color: var(--text-muted); font-size: 14px;">Loading analytics data...</div>
    </div>
  </div>

  <script src="/analytics.js"></script>
</body>
</html>
