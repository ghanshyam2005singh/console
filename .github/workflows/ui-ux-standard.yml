name: UI/UX Standards

on:
  schedule:
    # Run nightly at 03:00 UTC (alongside card-standard-nightly)
    - cron: '0 3 * * *'
  pull_request:
    paths:
      - 'web/src/components/**'
      - 'web/src/test/ui-ux-standards.test.ts'
      - 'web/package.json'
      - 'web/package-lock.json'
  workflow_dispatch:

# Least-privilege: read-only by default; jobs declare write scopes individually
permissions: read-all

jobs:
  ui-ux-standard:
    if: github.repository == 'kubestellar/console'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci

      - name: Run UI/UX standards tests
        run: npx vitest run src/test/ui-ux-standards.test.ts
